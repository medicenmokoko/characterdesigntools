<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Caldero Mágico — ArtStudio</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#0f0e17;--card:#1a1828;--border:#2e2b4a;--pink:#ff6b9d;--yellow:#ffd166;--cyan:#06d6a0;--purple:#c77dff;--orange:#ff9a3c;--blue:#4cc9f0;--text:#f8f4ff;--muted:#9b97b8;}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
.bubbles{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.bubble{position:absolute;border-radius:50%;filter:blur(80px);opacity:.12;animation:drift 20s ease-in-out infinite alternate;}
.b1{width:500px;height:500px;background:var(--purple);top:-100px;left:-100px;animation-delay:0s;}
.b2{width:400px;height:400px;background:var(--pink);bottom:-80px;right:-80px;animation-delay:-5s;}
.b3{width:300px;height:300px;background:var(--cyan);top:40%;left:50%;animation-delay:-10s;}
@keyframes drift{from{transform:translate(0,0)scale(1);}to{transform:translate(40px,30px)scale(1.1);}}
nav{position:relative;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:1.2rem 2rem;border-bottom:1px solid var(--border);background:rgba(15,14,23,.85);backdrop-filter:blur(12px);}
.nav-logo{font-family:'Fredoka One',cursive;font-size:1.4rem;background:linear-gradient(135deg,var(--pink),var(--yellow));-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-decoration:none;}
.nav-links{display:flex;gap:.5rem;}
.nav-btn{font-family:'Nunito',sans-serif;font-size:.85rem;font-weight:800;padding:8px 18px;border-radius:50px;border:2px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;text-decoration:none;transition:all .2s;letter-spacing:.02em;}
.nav-btn:hover{border-color:var(--purple);color:var(--purple);background:#c77dff15;}
.nav-btn.active{background:var(--purple);border-color:var(--purple);color:#fff;}
.hero{position:relative;z-index:1;text-align:center;padding:3.5rem 1rem 2rem;}
.cauldron-emoji{font-size:5rem;line-height:1;display:block;margin-bottom:1rem;animation:wobble 3s ease-in-out infinite;filter:drop-shadow(0 0 30px #c77dff66);}
@keyframes wobble{0%,100%{transform:rotate(-5deg)scale(1);}50%{transform:rotate(5deg)scale(1.05);}}
.hero h1{font-family:'Fredoka One',cursive;font-size:clamp(2.5rem,6vw,4rem);background:linear-gradient(135deg,var(--pink) 0%,var(--yellow) 50%,var(--cyan) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:.5rem;line-height:1.1;}
.hero p{font-size:1.05rem;color:var(--muted);font-weight:600;max-width:480px;margin:0 auto;}
main{position:relative;z-index:1;max-width:980px;margin:0 auto;padding:1.5rem 1.5rem 4rem;}
.slots-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem;margin-bottom:2rem;}
.slot-card{background:var(--card);border:2px solid var(--border);border-radius:20px;padding:1.2rem;text-align:center;transition:border-color .2s,transform .2s;}
.slot-card:hover{transform:translateY(-3px);}
.slot-label{font-size:.7rem;font-weight:800;text-transform:uppercase;letter-spacing:.12em;margin-bottom:.8rem;display:flex;align-items:center;justify-content:center;gap:5px;}
.slot-dot{width:8px;height:8px;border-radius:50%;}
.slot-value{font-family:'Fredoka One',cursive;font-size:1.4rem;line-height:1.2;min-height:2.5rem;display:flex;align-items:center;justify-content:center;transition:all .3s;}
.slot-card:nth-child(1){border-color:#ff6b9d44;}
.slot-card:nth-child(1) .slot-label{color:var(--pink);}
.slot-card:nth-child(1) .slot-dot{background:var(--pink);}
.slot-card:nth-child(1) .slot-value{color:var(--pink);}
.slot-card:nth-child(2){border-color:#c77dff44;}
.slot-card:nth-child(2) .slot-label{color:var(--purple);}
.slot-card:nth-child(2) .slot-dot{background:var(--purple);}
.slot-card:nth-child(2) .slot-value{color:var(--purple);}
.slot-card:nth-child(3){border-color:#06d6a044;}
.slot-card:nth-child(3) .slot-label{color:var(--cyan);}
.slot-card:nth-child(3) .slot-dot{background:var(--cyan);}
.slot-card:nth-child(3) .slot-value{color:var(--cyan);}
.generate-wrap{text-align:center;margin-bottom:2.5rem;}
.btn-generate{font-family:'Fredoka One',cursive;font-size:1.3rem;letter-spacing:.04em;padding:16px 52px;border-radius:50px;border:none;background:linear-gradient(135deg,var(--pink),var(--purple));color:#fff;cursor:pointer;box-shadow:0 8px 32px #ff6b9d44,0 2px 8px #0008;transition:transform .15s,box-shadow .15s;position:relative;overflow:hidden;}
.btn-generate::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--yellow),var(--orange));opacity:0;transition:opacity .3s;}
.btn-generate:hover{transform:scale(1.06);box-shadow:0 12px 40px #ff6b9d66;}
.btn-generate:hover::after{opacity:1;}
.btn-generate span{position:relative;z-index:1;}
.btn-generate:active{transform:scale(.97);}
.result-card{background:var(--card);border:2px solid var(--border);border-radius:24px;padding:2rem;display:none;animation:popIn .4s cubic-bezier(.34,1.56,.64,1);}
.result-card.show{display:block;}
@keyframes popIn{from{opacity:0;transform:scale(.9)translateY(20px);}to{opacity:1;transform:scale(1)translateY(0);}}
.result-header{display:flex;align-items:center;gap:10px;margin-bottom:1.2rem;}
.result-tag{font-size:.7rem;font-weight:800;letter-spacing:.12em;text-transform:uppercase;padding:4px 12px;border-radius:50px;}
.result-content{display:grid;grid-template-columns:auto 1fr;gap:1.5rem;align-items:start;}
.char-portrait{width:120px;height:120px;border-radius:16px;background:linear-gradient(135deg,#2e2b4a,#1a1828);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:4rem;flex-shrink:0;}
.result-details h2{font-family:'Fredoka One',cursive;font-size:1.8rem;margin-bottom:.4rem;}
.result-badges{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:.8rem;}
.badge-pill{font-size:.75rem;font-weight:700;padding:4px 12px;border-radius:50px;}
.result-bio{font-size:.9rem;color:var(--muted);line-height:1.7;font-weight:600;}
.inspo-section{margin-top:3rem;}
.section-title{font-family:'Fredoka One',cursive;font-size:1.4rem;margin-bottom:1rem;display:flex;align-items:center;gap:8px;}
.inspo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:.75rem;}
.inspo-chip{background:var(--card);border:2px solid var(--border);border-radius:14px;padding:.7rem 1rem;cursor:pointer;transition:all .2s;text-align:left;}
.inspo-chip:hover{transform:translateY(-2px);}
.inspo-chip .ic-emoji{font-size:1.5rem;margin-bottom:4px;}
.inspo-chip .ic-name{font-size:.78rem;font-weight:800;color:var(--text);}
.inspo-chip .ic-type{font-size:.7rem;color:var(--muted);}
.spinning{animation:spinY .4s ease;}
@keyframes spinY{0%{transform:rotateX(90deg);opacity:0;}100%{transform:rotateX(0deg);opacity:1;}}
</style>
</head>
<body>
<div class="bubbles"><div class="bubble b1"></div><div class="bubble b2"></div><div class="bubble b3"></div></div>
<nav>
  <a href="index.html" class="nav-logo">🎨 ArtStudio</a>
  <div class="nav-links">
    <a href="index.html"    class="nav-btn active">🧙 Caldero</a>
    <a href="lighting.html" class="nav-btn">💡 Iluminación</a>
  </div>
</nav>
<div class="hero">
  <span class="cauldron-emoji">🧙‍♂️</span>
  <h1>Caldero Mágico</h1>
  <p>Lanza los dados y descubre tu próximo personaje épico</p>
</div>
<main>
  <div class="slots-row">
    <div class="slot-card"><div class="slot-label"><span class="slot-dot"></span>Personaje</div><div class="slot-value" id="slotChar">???</div></div>
    <div class="slot-card"><div class="slot-label"><span class="slot-dot"></span>Personalidad</div><div class="slot-value" id="slotPersonality">???</div></div>
    <div class="slot-card"><div class="slot-label"><span class="slot-dot"></span>Contexto</div><div class="slot-value" id="slotContext">???</div></div>
  </div>
  <div class="generate-wrap">
    <button class="btn-generate" onclick="generate()"><span>✨ ¡Tirar los dados!</span></button>
  </div>
  <div class="result-card" id="resultCard">
    <div class="result-header"><span class="result-tag" style="background:#c77dff22;color:#c77dff;">PERSONAJE GENERADO</span></div>
    <div class="result-content">
      <div class="char-portrait" id="charPortrait">🧛</div>
      <div class="result-details">
        <h2 id="resultName" style="color:var(--pink)">—</h2>
        <div class="result-badges" id="resultBadges"></div>
        <p class="result-bio" id="resultBio">—</p>
      </div>
    </div>
  </div>
  <div class="inspo-section">
    <div class="section-title">🎲 Ideas rápidas</div>
    <div class="inspo-grid" id="inspoGrid"></div>
  </div>
</main>
<script>
const CHARACTERS=[{name:"Vampiro",emoji:"🧛",color:"#ff6b9d"},{name:"Bruja",emoji:"🧙‍♀️",color:"#c77dff"},{name:"Robot",emoji:"🤖",color:"#4cc9f0"},{name:"Dragón",emoji:"🐉",color:"#ff9a3c"},{name:"Elfo",emoji:"🧝",color:"#06d6a0"},{name:"Pirata",emoji:"🏴‍☠️",color:"#ffd166"},{name:"Fantasma",emoji:"👻",color:"#c8b6ff"},{name:"Cazador",emoji:"🏹",color:"#ff9a3c"},{name:"Mago",emoji:"🧝‍♂️",color:"#c77dff"},{name:"Cyborg",emoji:"🦾",color:"#4cc9f0"},{name:"Hada",emoji:"🧚",color:"#ff6b9d"},{name:"Esqueleto",emoji:"💀",color:"#e0e0e0"},{name:"Sirena",emoji:"🧜",color:"#06d6a0"},{name:"Demonio",emoji:"😈",color:"#ff4444"},{name:"Ángel Caído",emoji:"😇",color:"#ffd166"},{name:"Alien",emoji:"👽",color:"#06d6a0"}];
const PERSONALITIES=[{name:"Tímido",color:"#c77dff"},{name:"Sarcástico",color:"#ff6b9d"},{name:"Heroico",color:"#ffd166"},{name:"Caótico",color:"#ff9a3c"},{name:"Melancólico",color:"#4cc9f0"},{name:"Arrogante",color:"#ff6b9d"},{name:"Curioso",color:"#06d6a0"},{name:"Misterioso",color:"#c77dff"},{name:"Adorable",color:"#ff6b9d"},{name:"Traicionero",color:"#ff4444"},{name:"Sabio",color:"#ffd166"},{name:"Ingenuo",color:"#06d6a0"},{name:"Impulsivo",color:"#ff9a3c"},{name:"Calculador",color:"#4cc9f0"}];
const CONTEXTS=[{name:"Apocalipsis Zombie",color:"#06d6a0"},{name:"Edad Media",color:"#ffd166"},{name:"Ciberpunk 2099",color:"#4cc9f0"},{name:"Escuela de Magia",color:"#c77dff"},{name:"Espacio Profundo",color:"#4cc9f0"},{name:"Posguerra Nuclear",color:"#ff9a3c"},{name:"Olimpo Griego",color:"#ffd166"},{name:"Tokyo Neon",color:"#ff6b9d"},{name:"Selva Encantada",color:"#06d6a0"},{name:"Desierto Mágico",color:"#ff9a3c"},{name:"Submundo Steampunk",color:"#ffd166"},{name:"Colonia en Marte",color:"#ff6b9d"}];
const BIOS=[(c,p,ctx)=>`Un ${c} de naturaleza ${p.toLowerCase()} que sobrevivió al caos del ${ctx}. Sus cicatrices cuentan historias que pocos se atreven a escuchar.`,(c,p,ctx)=>`Nadie esperaba que un ${c} ${p.toLowerCase()} se convirtiera en la leyenda del ${ctx}. Y sin embargo, aquí está.`,(c,p,ctx)=>`En el ${ctx}, ser ${p.toLowerCase()} es una maldición. Ser ${c} es otra. Este personaje carga con las dos.`,(c,p,ctx)=>`El ${ctx} lo cambió todo. Un ${c} que alguna vez fue ${p.toLowerCase()} ahora debe decidir qué lado de la historia quiere contar.`];
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}
function animate(el){el.classList.remove('spinning');void el.offsetWidth;el.classList.add('spinning');setTimeout(()=>el.classList.remove('spinning'),400);}
function generate(){
  const char=pick(CHARACTERS),pers=pick(PERSONALITIES),ctx=pick(CONTEXTS);
  const s1=document.getElementById('slotChar'),s2=document.getElementById('slotPersonality'),s3=document.getElementById('slotContext');
  s1.textContent=char.emoji+' '+char.name;s2.textContent=pers.name;s3.textContent=ctx.name;
  s1.style.color=char.color;s2.style.color=pers.color;s3.style.color=ctx.color;
  animate(s1);animate(s2);animate(s3);
  const bio=pick(BIOS)(char.name,pers.name,ctx.name);
  const card=document.getElementById('resultCard');card.classList.remove('show');void card.offsetWidth;
  document.getElementById('charPortrait').textContent=char.emoji;
  document.getElementById('resultName').textContent=char.name+' '+pers.name;
  document.getElementById('resultName').style.color=char.color;
  document.getElementById('resultBadges').innerHTML=`<span class="badge-pill" style="background:${char.color}22;color:${char.color}">${char.name}</span><span class="badge-pill" style="background:${pers.color}22;color:${pers.color}">${pers.name}</span><span class="badge-pill" style="background:${ctx.color}22;color:${ctx.color}">${ctx.name}</span>`;
  document.getElementById('resultBio').textContent=bio;
  card.classList.add('show');buildInspo();
}
function buildInspo(){
  const grid=document.getElementById('inspoGrid');grid.innerHTML='';
  for(let i=0;i<8;i++){
    const c=pick(CHARACTERS),p=pick(PERSONALITIES),x=pick(CONTEXTS);
    const div=document.createElement('div');div.className='inspo-chip';div.style.borderColor=c.color+'44';
    div.innerHTML=`<div class="ic-emoji">${c.emoji}</div><div class="ic-name" style="color:${c.color}">${c.name} ${p.name}</div><div class="ic-type">${x.name}</div>`;
    div.onclick=()=>applyInspo(c,p,x);grid.appendChild(div);
  }
}
function applyInspo(char,pers,ctx){
  const s1=document.getElementById('slotChar'),s2=document.getElementById('slotPersonality'),s3=document.getElementById('slotContext');
  s1.textContent=char.emoji+' '+char.name;s1.style.color=char.color;s2.textContent=pers.name;s2.style.color=pers.color;s3.textContent=ctx.name;s3.style.color=ctx.color;
  animate(s1);animate(s2);animate(s3);
  const bio=pick(BIOS)(char.name,pers.name,ctx.name);
  document.getElementById('charPortrait').textContent=char.emoji;document.getElementById('resultName').textContent=char.name+' '+pers.name;document.getElementById('resultName').style.color=char.color;
  document.getElementById('resultBadges').innerHTML=`<span class="badge-pill" style="background:${char.color}22;color:${char.color}">${char.name}</span><span class="badge-pill" style="background:${pers.color}22;color:${pers.color}">${pers.name}</span><span class="badge-pill" style="background:${ctx.color}22;color:${ctx.color}">${ctx.name}</span>`;
  document.getElementById('resultBio').textContent=bio;
  const card=document.getElementById('resultCard');card.classList.remove('show');void card.offsetWidth;card.classList.add('show');
}
buildInspo();
</script>
</body>
</html>
